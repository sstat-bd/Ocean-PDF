<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Ocean PDF editor Pro — v 0.29</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="icon" href="../sta.ico" type="image/x-icon">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<style>
:root{
  --accent:#3498db;
  --toolbar-border:#013A63;
  --toolbar-fill:rgba(135,206,250,0.98);
  --panel-bg:#1e272e;
  --sidebar-width:220px;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;font-family:Segoe UI, Roboto, Arial; display:flex; flex-direction:column; background:#f2f4f7; height:100vh;}
header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#fff;border-bottom:1px solid #e6e9ee;z-index:1000}
.logo{font-weight:800;color:var(--accent);font-size:18px}
.header-btn{padding:8px 14px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer}
.header-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);margin-left:auto}
.controls{display:flex;gap:8px;align-items:center;padding:8px 16px;background:#fff;border-bottom:1px solid #eee}
.controls .small{padding:6px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer}
.workspace{flex:1;display:flex;overflow:hidden;min-height:0}
#sidebar{width:var(--sidebar-width);min-width:var(--sidebar-width);background:var(--panel-bg);color:#fff;overflow-y:auto;scrollbar-gutter: stable both-edges;padding:16px 12px;display:flex;flex-direction:column;gap:12px;align-items:center;border-right:1px solid rgba(0,0,0,0.2);}
.thumb-card{background:#fff;border-radius:6px;overflow:hidden;cursor:pointer;border:2px solid transparent;position:relative;height:140px;width:100%;display:flex;align-items:center;justify-content:center}
.thumb-card canvas{width:100%;height:auto;display:block;border-radius:4px}
.thumb-card.active{border-color:var(--accent)}
.page-num{position:absolute;left:50%;transform:translateX(-50%);bottom:6px;background:rgba(0,0,0,0.6);color:#fff;padding:2px 6px;font-size:12px;border-radius:4px}
.viewport{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:20px;min-height:0}
#pdf-wrapper{position:relative;background:#fff;box-shadow:0 8px 30px rgba(0,0,0,0.12);padding:12px;overflow:visible}
#pdf-canvas{display:block;max-width:100%}
#interaction-layer{position:absolute;top:12px;left:12px;width:calc(100% - 24px);height:calc(100% - 24px);pointer-events:none}
#floating-toolbar{
  position:absolute;
  left:18px;
  top:18px;
  z-index:9999;
  display:flex;
  gap:8px;
  align-items:center;
  padding:8px;
  border-radius:10px;
  border:2px solid var(--toolbar-border);
  background:var(--toolbar-fill);
  box-shadow:0 8px 30px rgba(0,0,0,0.12);
  user-select:none;
  min-width:360px;
  pointer-events:auto;            /* ensure toolbar receives pointer events */
  -webkit-user-select:none;
  touch-action:none;
}
.handle-left, .handle-right{
  cursor:grab;
  padding:0 8px;
  color:#013A63;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
}
.handle-left:active, .handle-right:active { cursor:grabbing; }
.handle-dot{width:6px;height:6px;background:#013A63;border-radius:50%; margin:2px 0}
.group{display:flex;gap:6px;align-items:center;padding:0 6px}
button.tool{background:#fff;border:1px solid rgba(0,0,0,0.08);padding:6px;border-radius:6px;cursor:pointer}
button.tool.active{background:var(--toolbar-border);color:#fff;border-color:var(--toolbar-border)}
select,input[type=color],input[type=number]{padding:6px;border-radius:6px;border:1px solid #ccc}
.word-bbox{position:absolute;pointer-events:auto;white-space:pre;line-height:1;color:transparent;background:transparent;user-select:none}
.word-bbox.ui-active,.word-bbox.modified{color:var(--native-fg)!important;background:var(--native-bg)!important;z-index:10}
.word-bbox.editing{outline:2px solid var(--toolbar-border); background:rgba(135,206,250,0.96)!important; color:var(--native-fg)!important; z-index:300; user-select:text}
.word-bbox.dragging{opacity:0.95;z-index:400;cursor:move!important}
.word-bbox.erased{opacity:0;pointer-events:none}
.cursor-select{cursor:default}
.cursor-move{cursor:move}
.cursor-erase{cursor:crosshair}
.hidden{display:none !important}
@media (max-width:900px){ #sidebar{display:none} }
</style>
</head>
<body>

<header>
  <div class="logo">
    <img src="../sta.ico" alt="Ocean PDF Pro Icon" style="height:24px; width:24px; vertical-align:middle; margin-right:8px;">
    Ocean PDF Pro v 0.29
  </div>
  <input id="loader" type="file" accept="application/pdf" style="display:none">
  <button class="header-btn" onclick="document.getElementById('loader').click()">Choose File</button>
  <button class="header-btn" onclick="toggleToolbar()">Toolbar</button>
  <button class="header-btn primary" id="export-btn" disabled>Export PDF</button>
</header>

<div class="controls">
  <div class="small" onclick="zoomOut()">− Zoom</div>
  <div class="small" onclick="zoomIn()">+ Zoom</div>
  <div class="small" onclick="fitWidth()">Fit</div>
  <div style="width:12px"></div>
  <div class="small" onclick="prevPage()">◀ Prev</div>
  <div class="small" id="page-indicator">Page 1 / 1</div>
  <div class="small" onclick="nextPage()">Next ▶</div>
</div>

<div class="workspace">
  <aside id="sidebar" aria-label="Page thumbnails"></aside>

  <div class="viewport">
    <div id="pdf-wrapper">
      <!-- Floating toolbar (visible by default). Use .hidden to hide -->
      <div id="floating-toolbar" role="toolbar" aria-hidden="false">
        <div class="handle-left" title="Drag toolbar (left)"><span class="handle-dot"></span></div>

        <div class="group">
          <button id="undo-btn" class="tool" title="Undo" onclick="undo()">⟲</button>
          <button id="redo-btn" class="tool" title="Redo" onclick="redo()">⟳</button>
        </div>

        <div class="group">
          <button id="tool-arrow" class="tool active" title="Arrow (select/edit)" onclick="setTool('arrow')">➔</button>
          <button id="tool-move" class="tool" title="Move" onclick="setTool('move')">✥</button>
          <button id="tool-erase" class="tool" title="Erase" onclick="setTool('erase')">⌫</button>
        </div>

        <div class="group">
          <button class="tool" onclick="applyToolbar('bold')" id="btn-bold"><b>B</b></button>
          <button class="tool" onclick="applyToolbar('italic')" id="btn-italic"><i>I</i></button>
          <button class="tool" onclick="applyToolbar('underline')" id="btn-underline"><u>U</u></button>
          <button class="tool" onclick="addTextBox()" id="btn-text">Txt</button>
          <input id="color-picker" type="color" onchange="applyToolbar('color')" title="Color" style="width:34px;height:34px;border:none;padding:0;">
        </div>

        <div class="group" style="border:none">
          <select id="font-family" onchange="applyToolbar('font')"></select>
          <input id="font-size" type="number" min="6" max="200" style="width:64px" onchange="applyToolbar('size')">
          <button onclick="closeToolbar()" style="color:#e74c3c;">✕</button>
        </div>

        <div class="handle-right" title="Drag toolbar (right)"><span class="handle-dot"></span></div>
      </div>

      <canvas id="pdf-canvas"></canvas>
      <div id="interaction-layer"></div>
    </div>
  </div>
</div>
